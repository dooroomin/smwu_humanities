<style>

  #app{width:100%;max-width:550px}
  .card{background:#fff;border-radius:24px;padding:2.5rem 1.5rem;box-shadow:0 10px 30px rgba(0,0,0,0.05)}
  .screen{display:none}.screen.active{display:block}
  .prog-wrap{height:6px;background:#eee;border-radius:10px;margin-bottom:2rem}
  .prog-fill{height:100%;background:#6C63FF;border-radius:10px;transition:width 0.3s ease}
  .q-num{font-size:14px;color:#aaa;margin-bottom:10px;font-weight:700}
  .q-text{font-size:19px;font-weight:700;color:#222;line-height:1.5;margin-bottom:2rem;word-break:keep-all}
  .choices{display:flex;flex-direction:column;gap:12px}
  .cbtn{padding:16px 20px;border:2px solid #f0f0f0;border-radius:16px;background:#fff;color:#444;font-size:15px;line-height:1.4;text-align:left;cursor:pointer;transition:all 0.2s;font-family:inherit}
  .cbtn:hover{background:#f8f7ff;border-color:#6C63FF}
  .cbtn.sel{background:#6C63FF;border-color:#6C63FF;color:#fff;font-weight:600}
  .next-btn{display:block;width:100%;padding:16px;background:#6C63FF;color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;margin-top:2rem;transition:0.2s}
  .next-btn:disabled{background:#ddd;cursor:not-allowed}
  .intro-emoji{font-size:64px;text-align:center;margin-bottom:1.5rem}
  .intro-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:1rem;color:#222}
  .intro-sub{font-size:15px;color:#666;text-align:center;line-height:1.6;margin-bottom:2rem}
  .name-input{width:100%;padding:15px;border:2px solid #eee;border-radius:14px;font-size:16px;margin-bottom:1.5rem;outline:none}
  .name-input:focus{border-color:#6C63FF}
  .start-btn{display:block;width:100%;padding:16px;background:#6C63FF;color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer}
  .r-emoji{font-size:60px;text-align:center;margin-bottom:1rem}
  .r-code{font-size:18px;font-weight:800;color:#6C63FF;text-align:center;letter-spacing:2px}
  .r-name{font-size:24px;font-weight:800;text-align:center;margin:10px 0}
  .r-desc{background:#f8f9fa;padding:1.5rem;border-radius:16px;font-size:15px;line-height:1.7;color:#444;margin-bottom:1.5rem}
  .chip{display:inline-block;padding:6px 12px;background:#eef;color:#55c;border-radius:8px;font-size:13px;margin:4px;font-weight:600}
  .retry-btn{width:100%;padding:14px;background:none;border:2px solid #eee;border-radius:14px;color:#999;cursor:pointer;margin-top:1rem}
</style>
</head>
<body>
<div id="app">
<div class="card">
  <div id="s-intro" class="screen active">
    <div class="intro-emoji">🏛️</div>
    <div class="intro-title">인문학 유형 테스트</div>
    <div class="intro-sub">일상 속 선택들로 알아보는<br>나만의 인문학 유형은 무엇일까요?</div>
    <input class="name-input" id="nameInput" type="text" placeholder="이름 입력" maxlength="10">
    <button class="start-btn" onclick="startTest()">테스트 시작</button>
  </div>

  <div id="s-quiz" class="screen">
    <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    <div class="q-num" id="qnum"></div>
    <div class="q-text" id="qtext"></div>
    <div class="choices" id="choices"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()" disabled>다음 문항</button>
  </div>

  <div id="s-result" class="screen">
    <div id="result-content"></div>
    <button class="retry-btn" onclick="restart()">다시 하기</button>
  </div>
</div>
</div>

var cur=0,scores={T:0,F:0,N:0,S:0,H:0,A:0,E:0,P:0,J:0},sel=null,nickname="";

function startTest(){
  nickname=document.getElementById('nameInput').value.trim()||"탐구자";
  document.getElementById('s-intro').classList.remove('active');
  document.getElementById('s-quiz').classList.add('active');
  renderQ();
}

function renderQ(){
  var q=Qs[cur];
  document.getElementById('qnum').textContent=(cur+1)+' / '+Qs.length;
  document.getElementById('prog').style.width=((cur/Qs.length)*100)+'%';
  document.getElementById('qtext').textContent=q.t;
  sel=null;document.getElementById('nextBtn').disabled=true;
  var c=document.getElementById('choices');c.innerHTML='';
  q.c.forEach(function(ch,i){
    var b=document.createElement('button');
    b.className='cbtn';b.textContent=ch.t;
    b.onclick=function(){pick(i)};
    c.appendChild(b);
  });
}

function pick(i){
  sel=i;
  document.querySelectorAll('.cbtn').forEach(function(b,j){b.classList.toggle('sel',j===i)});
  document.getElementById('nextBtn').disabled=false;
}

function nextQ(){
  var ax=Qs[cur].c[sel].ax;
  for(var k in ax)scores[k]+=ax[k];
  cur++;
  if(cur>=Qs.length)showResult();
  else renderQ();
}

function getType(){
  var TF=scores.T>=scores.F?'T':'F';
  var NS=scores.N>=scores.S?'N':'S';
  var HA=scores.H>=scores.A?'H':'P';
  var EJ=scores.E>=scores.J?'E':'J';
  var code=TF+NS+HA+EJ;
  return TYPES[code]?[code,TYPES[code]]:['SNPE',TYPES['SNPE']];
}

function showResult(){
  document.getElementById('s-quiz').classList.remove('active');
  document.getElementById('s-result').classList.add('active');
  var res=getType();var code=res[0];var t=res[1];
  document.getElementById('result-content').innerHTML=
    '<div class="r-emoji">'+t.emoji+'</div>'+
    '<div class="r-code">'+code+'</div>'+
    '<div class="r-name">'+t.name+'</div>'+
    '<div style="text-align:center;color:#666;font-size:14px;margin-bottom:1.5rem">'+t.sub+'</div>'+
    '<div class="r-desc"><strong>'+nickname+'</strong>님은 '+t.desc+'</div>'+
    '<div style="text-align:center"><span class="chip">#인문학</span><span class="chip">#유형테스트</span><span class="chip">#'+t.name+'</span></div>';
}

function restart(){
  location.reload();
}
</script>
