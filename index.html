<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 인문학 유형 테스트</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
  #app{width:100%;max-width:600px}
  .card{background:#fff;border-radius:20px;padding:2rem;box-shadow:0 2px 20px rgba(0,0,0,0.07)}
  .screen{display:none}.screen.active{display:block}
  .prog-wrap{height:5px;background:#ede9e0;border-radius:3px;margin-bottom:1.25rem}
  .prog-fill{height:100%;background:#7F77DD;border-radius:3px;transition:width 0.3s ease}
  .q-num{font-size:13px;color:#888;margin-bottom:8px}
  .q-text{font-size:17px;font-weight:600;color:#1a1a1a;line-height:1.6;margin-bottom:1.25rem}
  .choices{display:flex;flex-direction:column;gap:10px}
  .cbtn{padding:14px 16px;border:1.5px solid #e8e5df;border-radius:14px;background:#fff;color:#333;font-size:14px;line-height:1.5;text-align:left;cursor:pointer;transition:all 0.15s;font-family:inherit}
  .cbtn:hover{background:#f3f1fe;border-color:#7F77DD}
  .cbtn.sel{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;font-weight:500}
  .next-btn{display:block;width:100%;padding:14px;background:#7F77DD;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:1.25rem;transition:opacity 0.15s;font-family:inherit}
  .next-btn:disabled{opacity:0.3;cursor:not-allowed}
  .intro-emoji{font-size:52px;text-align:center;margin-bottom:1rem}
  .intro-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:0.6rem;color:#1a1a1a}
  .intro-sub{font-size:15px;color:#666;text-align:center;line-height:1.75;margin-bottom:1.5rem}
  .tag-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.75rem}
  .tag{font-size:12px;padding:5px 14px;border-radius:20px;background:#EEEDFE;color:#534AB7;font-weight:500}
  .name-input{width:100%;padding:13px 16px;border:1.5px solid #e0ddd5;border-radius:14px;background:#fafafa;color:#1a1a1a;font-size:15px;outline:none;margin-bottom:1.5rem;width:100%}
  .r-emoji{font-size:52px;text-align:center;margin-bottom:0.75rem}
  .r-code{font-size:20px;font-weight:700;color:#7F77DD;text-align:center;margin-bottom:4px;letter-spacing:0.1em}
  .r-name{font-size:22px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:6px}
  .r-sub{font-size:14px;color:#7F77DD;text-align:center;margin-bottom:1.25rem;font-weight:500}
  .r-desc{font-size:14px;color:#555;line-height:1.75;margin-bottom:1rem;background:#fcfcfc;padding:15px;border-radius:12px}
  .r-dir{font-size:14px;color:#444;line-height:1.75;padding:14px 18px;background:#f7f5ff;border-radius:0 12px 12px 0;border-left:3px solid #7F77DD;margin-bottom:1.25rem}
  .section-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;display:block}
  .chip{display:inline-block;font-size:12px;padding:6px 12px;margin:3px;border-radius:20px;background:#fff;color:#444;border:1px solid #e8e4dc}
  .retry-btn{display:block;width:100%;padding:12px;background:transparent;color:#888;border:1.5px solid #e8e4dc;border-radius:14px;font-size:14px;cursor:pointer;margin-top:2rem}
</style>
</head>
<body>
<div id="app">
<div class="card">
  <div id="s-intro" class="screen active">
    <div class="intro-emoji">🏛️</div>
    <div class="intro-title">인문학 성향 테스트</div>
    <div class="intro-sub">일상 속 나의 선택들로 알아보는<br>나만의 인문학적 시선과 추천 수업!</div>
    <div class="tag-row">
      <span class="tag">약 2분 소요</span>
      <span class="tag">12문항</span>
    </div>
    <input class="name-input" id="nameInput" type="text" placeholder="닉네임을 입력하세요" maxlength="12">
    <button class="next-btn" onclick="startTest()">시작하기</button>
  </div>

  <div id="s-quiz" class="screen">
    <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    <div class="q-num" id="qnum"></div>
    <div class="q-text" id="qtext"></div>
    <div class="choices" id="choices"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()" disabled>다음으로</button>
  </div>

  <div id="s-result" class="screen">
    <div id="result-content"></div>
    <button class="retry-btn" onclick="location.reload()">다시 테스트하기</button>
  </div>
</div>
</div>

  "SNPE":{emoji:"💡",name:"문화 기획자",sub:"트렌드를 읽고 새로운 판을 만드는 크리에이터",desc:"사람들이 무엇에 열광하는지 파악하는 눈이 빠르시군요. 대중의 마음을 읽는 기획자입니다.",dir:"홍보 마케팅, 문화 페스티벌 기획 분야를 추천합니다.",courses:["대중문화와 문화연구","대중매체와 역사문화의 이해","한국의 종교와 문화"]},
  "SFHJ":{emoji:"🕯️",name:"문화 전승자",sub:"소중한 것을 지키고 전하는 사람",desc:"오래된 것의 가치를 아시는군요. 공동체의 전통과 소중한 기억들을 지키고 전달하는 파수꾼입니다.",dir:"박물관 큐레이터나 기록물 관리 전문가가 어울립니다.",courses:["한국의 종교와 문화","대중매체와 역사문화의 이해","근현대정치사상"]},
  "SFHE":{emoji:"💬",name:"공동체 활동가",sub:"사람들 사이에서 연대를 만드는 실천가",desc:"혼자보다는 함께! 주변 사람들을 챙기고 공동체의 화합을 이끄는 리더십이 있습니다.",dir:"지역사회 활동이나 커뮤니티 비즈니스 분야가 좋습니다.",courses:["마이너리티 연구","가치있는 삶과 윤리학","한국의 종교와 문화"]},
  "SFPJ":{emoji:"🎨",name:"감성 예술가",sub:"일상과 감정을 아름답게 담아내는 미적 감수성",desc:"사소한 일상에서도 아름다움을 발견하는 눈을 가지셨네요. 감각이 예민하고 자신만의 기준이 뚜렷합니다.",dir:"예술 전시 기획이나 아트 디렉터 분야를 추천합니다.",courses:["예술과 미학","현대문학과 사회","대중문화와 문화연구"]},
  "SFPE":{emoji:"🌈",name:"감성 크리에이터",sub:"공감과 창의력으로 세상에 색을 더하는 사람",desc:"밝은 에너지로 주변을 환하게 만드시네요! 사람들과 소통하며 긍정적인 메시지를 전달합니다.",dir:"SNS 브랜딩이나 예술 교육 분야에서 활약하기 좋습니다.",courses:["대중문화와 문화연구","예술과 미학","융복합인문사회특수과제"]}
};

var cur=0,scores={T:0,F:0,N:0,S:0,H:0,A:0,E:0,P:0,J:0},sel=null,nickname="";

function startTest(){
  nickname=document.getElementById('nameInput').value.trim()||"익명";
  document.getElementById('s-intro').classList.remove('active');
  document.getElementById('s-quiz').classList.add('active');
  renderQ();
}

function renderQ(){
  var q=Qs[cur];
  document.getElementById('qnum').textContent=(cur+1)+' / '+Qs.length;
  document.getElementById('prog').style.width=((cur/Qs.length)*100)+'%';
  document.getElementById('qtext').textContent=q.t;
  sel=null;document.getElementById('nextBtn').disabled=true;
  var c=document.getElementById('choices');c.innerHTML='';
  q.c.forEach(function(ch,i){
    var b=document.createElement('button');
    b.className='cbtn';b.textContent=ch.t;
    b.onclick=function(){pick(i)};
    c.appendChild(b);
  });
}

function pick(i){
  sel=i;
  document.querySelectorAll('.cbtn').forEach(function(b,j){b.classList.toggle('sel',j===i)});
  document.getElementById('nextBtn').disabled=false;
}

function nextQ(){
  var ax=Qs[cur].c[sel].ax;
  for(var k in ax)scores[k]+=ax[k];
  cur++;
  if(cur>=Qs.length)showResult();
  else renderQ();
}

function getType(){
  var TF=scores.T>=scores.F?'T':'F';
  var NS=scores.N>=scores.S?'N':'S';
  var HA=scores.H>=scores.A?'H':'P';
  var EJ=scores.E>=scores.J?'E':'J';
  var code=TF+NS+HA+EJ;
  return TYPES[code]?[code,TYPES[code]]:['SNPE',TYPES['SNPE']];
}

function showResult(){
  document.getElementById('s-quiz').classList.remove('active');
  document.getElementById('s-result').classList.add('active');
  var res=getType();var code=res[0];var t=res[1];
  var coursesHtml=t.courses.map(function(c){return '<span class="chip">'+c+'</span>'}).join('');
  
  document.getElementById('result-content').innerHTML=
    '<div class="r-emoji">'+t.emoji+'</div>'+
    '<div class="r-code">'+code+'</div>'+
    '<div class="r-name">'+t.name+'</div>'+
    '<div class="r-sub">'+t.sub+'</div>'+
    '<div style="border-top:1px solid #eee;margin:1.5rem 0"></div>'+
    '<div class="r-desc"><strong>'+nickname+'님</strong>은 '+t.desc+'</div>'+
    '<div class="r-dir">💡 <strong>추천 가이드:</strong> '+t.dir+'</div>'+
    '<div style="margin-top:1.5rem">'+
    '<span class="section-label">성향 기반 추천 수업</span>'+
    '<div style="margin-top:8px">'+coursesHtml+'</div></div>';
}
</script>
