
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; }
.progress-bar-bg { height: 6px; background: var(--color-border-tertiary); border-radius: 99px; margin-bottom: 1.5rem; }
.progress-bar-fill { height: 6px; background: #1D9E75; border-radius: 99px; transition: width 0.4s; }
.section { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 1rem; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.1rem; cursor: pointer; background: var(--color-background-primary); }
.section-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.section-badge { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 2px 8px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); }
.section-arrow { font-size: 12px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.section-body { display: none; border-top: 0.5px solid var(--color-border-tertiary); }
.section-body.open { display: block; }
.item { display: grid; grid-template-columns: 1fr repeat(4, 72px); gap: 4px; align-items: center; padding: 8px 1.1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
.item:last-child { border-bottom: none; }
.item-label { font-size: 13px; color: var(--color-text-primary); line-height: 1.4; padding-right: 8px; }
.item-opts { display: contents; }
.opt-btn { font-size: 11px; padding: 4px 4px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; text-align: center; line-height: 1.3; transition: all 0.15s; white-space: nowrap; }
.opt-btn:hover { background: var(--color-background-secondary); }
.opt-btn.sel-yes { background: #E1F5EE; border-color: #1D9E75; color: #085041; font-weight: 500; }
.opt-btn.sel-no { background: #FCEBEB; border-color: #E24B4A; color: #501313; font-weight: 500; }
.opt-btn.sel-know { background: #FAEEDA; border-color: #BA7517; color: #412402; font-weight: 500; }
.opt-btn.sel-need { background: #EEEDFE; border-color: #7F77DD; color: #26215C; font-weight: 500; }
.col-headers { display: grid; grid-template-columns: 1fr repeat(4, 72px); gap: 4px; padding: 6px 1.1rem; background: var(--color-background-secondary); }
.col-h { font-size: 11px; color: var(--color-text-secondary); text-align: center; }
.col-h:first-child { text-align: left; }
.result-area { display: none; margin-top: 1.5rem; border-radius: var(--border-radius-lg); overflow: hidden; border: 1.5px solid var(--color-border-tertiary); }
.result-area.show { display: block; }
.result-header { padding: 1.25rem; }
.result-header.stage1 { background: #E1F5EE; }
.result-header.stage2 { background: #FAEEDA; }
.result-header.stage3 { background: #FCEBEB; }
.result-stage { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
.stage1 .result-stage { color: #0F6E56; }
.stage2 .result-stage { color: #854F0B; }
.stage3 .result-stage { color: #A32D2D; }
.result-title { font-size: 18px; font-weight: 500; }
.stage1 .result-title { color: #04342C; }
.stage2 .result-title { color: #412402; }
.stage3 .result-title { color: #501313; }
.result-body { padding: 1.25rem; background: var(--color-background-primary); }
.result-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; margin-bottom: 1rem; }
.result-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; }
.stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.stat-yes .stat-num { color: #0F6E56; }
.stat-no .stat-num { color: #A32D2D; }
.stat-know .stat-num { color: #854F0B; }
.stat-need .stat-num { color: #534AB7; }
.warn-list { font-size: 13px; color: var(--color-text-secondary); line-height: 1.8; }
.warn-list li { margin-left: 1rem; }
.bottom-bar { display: flex; gap: 8px; padding: 1.25rem 0 0; }
.btn-reset { font-size: 13px; padding: 8px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; }
.btn-check { font-size: 14px; font-weight: 500; padding: 10px 24px; border: none; border-radius: var(--border-radius-md); background: #1D9E75; color: #fff; cursor: pointer; flex: 1; }
.btn-check:hover { background: #0F6E56; }
.answered-ct { font-size: 13px; color: var(--color-text-secondary); padding: 0.6rem 0 1rem; }
</style>

<div class="wrap" id="app"></div>

<script>
const sections = [
  { title: "1. 자립계획서 작성", items: ["퇴소 예정일을 알고 있다","퇴소 후 첫 1개월 동안 어디서 살지 정해져 있다","퇴소 후 3개월 동안의 생활 계획이 있다","나의 월수입과 예상 지출을 적어본 적이 있다","주거·소득·학업/진로·건강·관계를 포함한 자립계획을 세워본 적이 있다","자립계획서에 내가 직접 정한 목표가 들어가 있다","목표가 구체적인 행동으로 작성되어 있다"] },
  { title: "2. 일상생활 및 자기관리", items: ["혼자 식사를 준비하거나 해결할 수 있다","식품을 살 때 유통기한과 보관 방법을 확인할 수 있다","냉장/냉동 보관이 필요한 음식을 구분할 수 있다","청소·분리수거·음식물 쓰레기 처리를 할 수 있다","세탁 방법을 알고 옷을 관리할 수 있다","수면·식사·출근 시간을 스스로 관리할 수 있다","아플 때 병원에 가야 하는 기준을 알고 있다","건강보험료 납부 의무를 알고 있다","심리적 어려움이 있을 때 도움받을 기관을 알고 있다","응급상황이 생겼을 때 연락할 곳을 알고 있다"] },
  { title: "3. 경제 및 자산관리", items: ["한 달 예상 수입을 계산할 수 있다","월세·식비·교통비 등 예상 지출을 계산할 수 있다","한 달 생활비 예산표를 작성해본 적이 있다","체크카드·신용카드·직불카드의 차이를 알고 있다","인터넷뱅킹이나 모바일뱅킹을 사용할 수 있다","저축 또는 적금을 하고 있다","비상금이 왜 필요한지 알고 있다","돈이 부족할 때 빌리는 방법과 위험성을 알고 있다","불법 대출·다단계·고금리 대출의 위험성을 알고 있다","돈을 왜 벌어야 하는지·어디에 쓸 것인지 계획이 있다"] },
  { title: "4. 주거 준비", items: ["퇴소 후 살 곳 후보가 있다","주거 선택지를 비교해본 적이 있다","보증금·월세·관리비의 차이를 알고 있다","집을 구하는 방법을 알고 있다","임대차계약서에서 확인해야 할 내용을 알고 있다","전입신고와 확정일자가 무엇인지 알고 있다","공과금의 종류와 납부 방법을 알고 있다","월세나 공과금을 내지 못했을 때 생기는 일을 알고 있다","집에 문제가 생겼을 때 집주인에게 연락할 수 있다","주거 문제가 생겼을 때 도움받을 기관을 알고 있다"] },
  { title: "5. 진로 및 취업 준비", items: ["하고 싶은 일이 정리되어 있다","직장을 구하기 위한 구체적인 계획이 있다","이력서와 자기소개서를 작성할 수 있다","고용지원센터나 취업지원 서비스를 알고 있다","근로계약서에서 확인해야 할 내용을 알고 있다","최저임금을 알고 있다","4대보험·퇴직금·이직의 의미를 알고 있다","부당해고나 임금체불 시 대처 방법을 알고 있다","지각·결근·태도가 일자리 유지에 영향을 준다는 것을 알고 있다","아르바이트가 끊겼을 때 다음 대안을 생각해본 적이 있다","단기 아르바이트 외에 장기적인 진로 계획이 있다"] },
  { title: "6. 사회적 관계와 도움 요청", items: ["내 생각이나 감정을 다른 사람에게 말할 수 있다","도움이 필요할 때 도움을 요청할 수 있다","거절해야 할 상황에서 거절할 수 있다","갈등이 생겼을 때 대처하는 방법이 있다","위험에 처했을 때 나를 도와줄 사람이 있다","퇴소 후 연락할 수 있는 쉼터 담당자나 기관이 있다","긴급상황 시 연락할 비상 연락망이 정리되어 있다","가족·친구·기관 중 최소 한 곳 이상 도움받을 자원이 있다","모르는 것이 있을 때 누구에게 물어볼지 알고 있다"] },
  { title: "7. 위기 대응 계획", items: ["월세를 내기 어려울 때 어떻게 해야 할지 알고 있다","갑자기 일을 그만두게 되었을 때 대처 계획이 있다","아플 때 병원비와 진료 방법을 알고 있다","돈이 부족할 때 이용 가능한 지원제도를 알고 있다","위험한 사람이나 관계를 피하는 방법을 알고 있다","외롭거나 불안할 때 상담받을 수 있는 곳을 알고 있다","퇴소 후 문제가 생기면 가장 먼저 연락할 곳이 정해져 있다"] },
  { title: "8. 지원제도 이해 및 신청", items: ["내가 받을 수 있는 자립 지원 제도가 무엇인지 알고 있다","자립지원수당·주거지원·취업지원 등 신청 조건을 알고 있다","지원제도를 신청할 때 필요한 서류를 알고 있다","신청서를 혼자 작성할 수 있다","온라인 신청이나 기관 방문 신청 방법을 알고 있다","신청이 거절되거나 어려움이 생겼을 때 문의할 곳을 알고 있다"] },
];

const opts = ["예","아니오","알지만 못함","추가지원 필요"];
const keys = ["yes","no","know","need"];
const cls  = ["sel-yes","sel-no","sel-know","sel-need"];

const total = sections.reduce((s,x)=>s+x.items.length,0);
let answers = {}; // "s-i" -> key

function getAnswered() { return Object.keys(answers).length; }

function render() {
  const app = document.getElementById('app');
  const answered = getAnswered();

  let html = `<div class="progress-bar-bg"><div class="progress-bar-fill" id="pfill" style="width:${Math.round(answered/total*100)}%"></div></div>`;
  html += `<div class="answered-ct" id="act">${answered} / ${total}개 항목 응답됨</div>`;

  sections.forEach((sec, si) => {
    const secAnswered = sec.items.filter((_,ii)=>answers[`${si}-${ii}`]).length;
    html += `<div class="section">
      <div class="section-header" onclick="toggleSection(${si})">
        <span class="section-title">${sec.title}</span>
        <span style="display:flex;align-items:center;gap:6px;">
          <span class="section-badge">${secAnswered}/${sec.items.length}</span>
          <span class="section-arrow" id="arr-${si}">▼</span>
        </span>
      </div>
      <div class="section-body" id="body-${si}">
        <div class="col-headers">
          <div class="col-h">점검 항목</div>
          <div class="col-h">예</div>
          <div class="col-h">아니오</div>
          <div class="col-h">알지만 못함</div>
          <div class="col-h">추가지원 필요</div>
        </div>`;
    sec.items.forEach((item, ii) => {
      const cur = answers[`${si}-${ii}`];
      html += `<div class="item">
        <div class="item-label">${item}</div>`;
      keys.forEach((k,ki)=>{
        html += `<button class="opt-btn ${cur===k?cls[ki]:''}" onclick="pick(${si},${ii},'${k}',this)">${opts[ki]}</button>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="bottom-bar">
    <button class="btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn-check" onclick="showResult()">결과 확인하기 →</button>
  </div>`;
  html += `<div class="result-area" id="result-area"></div>`;

  app.innerHTML = html;
}

function toggleSection(si) {
  const body = document.getElementById(`body-${si}`);
  const arr = document.getElementById(`arr-${si}`);
  const open = body.classList.toggle('open');
  arr.textContent = open ? '▲' : '▼';
}

function pick(si, ii, key) {
  const k = `${si}-${ii}`;
  if (answers[k] === key) { delete answers[k]; } else { answers[k] = key; }
  render();
  // reopen section
  const body = document.getElementById(`body-${si}`);
  const arr = document.getElementById(`arr-${si}`);
  if (body) { body.classList.add('open'); arr.textContent = '▲'; }
  document.getElementById('result-area').classList.remove('show');
}

function resetAll() {
  answers = {};
  render();
}

function showResult() {
  const counts = {yes:0, no:0, know:0, need:0};
  Object.values(answers).forEach(k => counts[k]++);
  const answered = getAnswered();
  const noOrKnowOrNeed = counts.no + counts.know + counts.need;

  // Critical items indices [section, item]
  const critical = [
    [3,0],[3,4],[3,5],[2,0],[2,1],[6,0],[0,1],[0,2]
  ];
  const criticalNoCount = critical.filter(([s,i])=>{ const v=answers[`${s}-${i}`]; return v==='no'||v===undefined; }).length;

  let stage, stageTitle, stageDesc, warnItems=[];

  if (answered < total * 0.5) {
    stage=2; stageTitle="아직 응답이 부족해요"; stageDesc="더 많은 항목에 응답한 뒤 결과를 확인해 주세요.";
  } else if (criticalNoCount >= 3 || counts.no >= total*0.35) {
    stage=3; stageTitle="3단계 — 퇴소 유예 또는 집중 지원 필요";
    stageDesc="아직 준비되지 않은 중요한 영역이 여럿 있어요. 퇴소 전 담당자와 함께 집중적으로 준비하는 것이 좋아요.";
    if (!answers['3-0']||answers['3-0']==='no') warnItems.push("퇴소 후 거주지가 정해지지 않았어요.");
    if (!answers['2-0']||answers['2-0']==='no') warnItems.push("월수입이 없거나 불안정해요.");
    if (counts.need > 3) warnItems.push("추가 지원이 필요한 항목이 많아요. 종사자와 함께 실습해 보세요.");
  } else if (counts.need > 3 || counts.know > total*0.25 || noOrKnowOrNeed > total*0.4) {
    stage=2; stageTitle="2단계 — 조건부 퇴소 가능";
    stageDesc="퇴소는 가능하지만, 일부 영역을 보완하면 더 안전한 자립을 시작할 수 있어요.";
    if (counts.need>0) warnItems.push(`추가 지원이 필요한 항목 ${counts.need}개를 담당자와 함께 실습해 보세요.`);
    if (counts.know>0) warnItems.push(`알지만 혼자 하기 어려운 항목 ${counts.know}개 — 직접 연습해 보세요.`);
    warnItems.push("월 생활비 시뮬레이션, 비상 연락망 작성, 퇴소 후 1개월·3개월 상담 일정을 확정하세요.");
  } else {
    stage=1; stageTitle="1단계 — 즉시 퇴소 가능";
    stageDesc="자립에 필요한 주요 항목들을 잘 준비하고 있어요. 자신감을 갖고 새 출발을 해도 좋아요!";
    if (counts.need>0) warnItems.push(`추가 지원 표시 항목 ${counts.need}개는 퇴소 전 담당자와 최종 확인해 보세요.`);
  }

  const stageClass = `stage${stage}`;
  let resultHtml = `<div class="result-header ${stageClass}">
    <div class="result-stage">종합 판정 결과</div>
    <div class="result-title">${stageTitle}</div>
  </div>
  <div class="result-body">
    <p class="result-desc">${stageDesc}</p>
    <div class="result-stats">
      <div class="stat stat-yes"><div class="stat-num">${counts.yes}</div><div class="stat-lbl">예</div></div>
      <div class="stat stat-no"><div class="stat-num">${counts.no}</div><div class="stat-lbl">아니오</div></div>
      <div class="stat stat-know"><div class="stat-num">${counts.know}</div><div class="stat-lbl">알지만 못함</div></div>
      <div class="stat stat-need"><div class="stat-num">${counts.need}</div><div class="stat-lbl">추가지원 필요</div></div>
    </div>`;
  if (warnItems.length) {
    resultHtml += `<ul class="warn-list">`;
    warnItems.forEach(w => { resultHtml += `<li>${w}</li>`; });
    resultHtml += `</ul>`;
  }
  resultHtml += `</div>`;

  const ra = document.getElementById('result-area');
  ra.innerHTML = resultHtml;
  ra.classList.add('show');
  ra.scrollIntoView({behavior:'smooth', block:'start'});
}

render();
</script>
