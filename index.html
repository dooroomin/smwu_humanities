  "TFPE":{emoji:"🎭",name:"이야기 만드는 사람",sub:"감정과 사회를 이야기로 엮어내는 창작자",desc:"사람과 사회에 대한 감수성이 풍부하고 그걸 이야기나 콘텐츠로 표현하고 싶어 하는 타입이에요. 공감 능력이 창작의 원동력입니다.",dir:"문화 콘텐츠·시나리오·미디어 분야에서 사람들의 이야기를 담아내는 <strong>감성 스토리텔러·콘텐츠 크리에이터</strong>로 활동하면 빛나요.",courses:["현대문학과 사회","대중문화와 문화연구","문화 텍스트로 읽는 여성 콤플렉스","정신분석학과 철학","예술과 미학"]},
  "SNHJ":{emoji:"📰",name:"현실 분석가",sub:"현장 데이터로 세상을 이해하는 실용주의자",desc:"추상보다 구체, 이론보다 현실을 중시하는 타입이에요. 실제 일어나는 일들을 정확히 파악하고 기록하는 데 강합니다.",dir:"저널리즘·사회학·공공정책 분야에서 현실을 정확히 분석하고 전달하는 <strong>팩트 기반 사회 분석가</strong>가 잘 맞아요.",courses:["경제학사","비교정치론","국제기구와 세계정치","대중매체와 역사문화의 이해","현대사회사상의 이해"]},
  "SNHE":{emoji:"📢",name:"현장 변혁가",sub:"이론이 아닌 발로 뛰며 바꾸는 행동파 활동가",desc:"문제를 발견하면 직접 움직이는 타입이에요. 공부를 위한 공부보다 세상을 바꾸기 위한 공부가 더 잘 맞습니다.",dir:"시민단체·노동·환경·인권 분야에서 직접 현장을 바꾸는 <strong>행동하는 인문학자</strong>로 활동하면 가장 빛나요.",courses:["마이너리티 연구","공공경제학","현대사회에서 공과 사의 문제","가치있는 삶과 윤리학","비교정치론"]},
  "SNPJ":{emoji:"🔬",name:"사회 과학자",sub:"데이터와 이론으로 사회를 해석하는 연구자",desc:"관찰하고 분석하는 걸 즐기는 타입이에요. 어떤 현상이든 '왜 그런가'를 논리적으로 설명하고 싶어 합니다.",dir:"사회학·경제학·정치학을 넘나들며 사회를 분석하는 <strong>학술 연구자나 싱크탱크 연구원</strong>이 잘 맞아요.",courses:["거시경제학","미시경제학원론","비교정치론","현대사회사상의 이해","융합인간학개론"]},
  "SNPE":{emoji:"💡",name:"문화 기획자",sub:"트렌드를 읽고 새로운 판을 만드는 크리에이터",desc:"유행과 문화를 빠르게 캐치하고 거기서 기회를 보는 타입이에요. 아이디어가 많고 실행력도 있습니다.",dir:"문화 기획·미디어·광고 분야에서 트렌드를 선도하는 <strong>문화 기획자·콘텐츠 디렉터</strong>로 나아가면 딱이에요.",courses:["대중문화와 문화연구","대중매체와 역사문화의 이해","한국의 종교와 문화","융복합인문사회특수과제","현대사회사상의 이해"]},
  "SFHJ":{emoji:"🕯️",name:"문화 전승자",sub:"소중한 것을 지키고 다음 세대에 전하는 사람",desc:"전통과 공동체를 소중히 여기는 타입이에요. 빠르게 변하는 세상 속에서 잊혀서는 안 될 것들을 붙잡으려 합니다.",dir:"문화유산·박물관·지역문화 분야에서 기억을 보존하고 전달하는 <strong>문화 큐레이터·아카이브 연구자</strong>가 어울려요.",courses:["한국의 종교와 문화","대중매체와 역사문화의 이해","세계문학과 융합인문학의 이해","근현대정치사상","융합인간학개론"]},
  "SFHE":{emoji:"💬",name:"공동체 활동가",sub:"사람들 사이에서 연대를 만드는 따뜻한 실천가",desc:"혼자보다 함께를 좋아하고 주변 사람들의 삶이 나아지길 진심으로 원하는 타입이에요. 현장에서 에너지가 넘칩니다.",dir:"지역사회·교육·복지 분야에서 사람과 사람을 잇는 <strong>커뮤니티 활동가·사회 교육자</strong>로 활동하면 최고예요.",courses:["마이너리티 연구","가치있는 삶과 윤리학","공공경제학","현대사회에서 공과 사의 문제","한국의 종교와 문화"]},
  "SFPJ":{emoji:"🎨",name:"감성 예술가",sub:"일상과 감정을 아름답게 담아내는 미적 감수성의 소유자",desc:"미적 감각이 뛰어나고 아름다움에서 의미를 찾는 타입이에요. 예술 작품 앞에서 멈추고 오래 느끼는 사람입니다.",dir:"예술·미학·문학을 엮어 창작하거나 비평하는 <strong>예술-인문 융합 창작자</strong>나 큐레이터가 잘 맞아요.",courses:["예술과 미학","세계문학과 융합인문학의 이해","현대문학과 사회","문화 텍스트로 읽는 여성 콤플렉스","대중문화와 문화연구"]},
  "SFPE":{emoji:"🌈",name:"감성 크리에이터",sub:"공감과 창의력으로 세상에 색을 더하는 사람",desc:"따뜻한 감수성과 창의적인 에너지가 공존하는 타입이에요. 주변 사람들에게 긍정적인 영향을 주고 싶어 합니다.",dir:"문화 콘텐츠·SNS·브랜딩 분야에서 사람들의 마음을 움직이는 <strong>감성 콘텐츠 크리에이터</strong>로 나아가면 빛나요.",courses:["대중문화와 문화연구","예술과 미학","신·인간·과학","현대문학과 사회","융복합인문사회특수과제"]}
};

var AX_LABEL={T:"논리·분석",F:"공감·감성",N:"추상·상상",S:"현실·구체",H:"역사 지향",A:"예술 지향",E:"사회 참여",P:"자유·탐험",J:"구조·체계"};
var cur=0,scores={T:0,F:0,N:0,S:0,H:0,A:0,E:0,P:0,J:0},sel=null,nickname="";

function startTest(){
  var v=document.getElementById('nameInput').value.trim();
  nickname=v||"익명의 탐구자";
  document.getElementById('s-intro').classList.remove('active');
  document.getElementById('s-quiz').classList.add('active');
  renderQ();
}

function renderQ(){
  var q=Qs[cur];
  document.getElementById('qnum').textContent=(cur+1)+' / '+Qs.length;
  document.getElementById('prog').style.width=((cur/Qs.length)*100)+'%';
  document.getElementById('qtext').textContent=q.t;
  sel=null;
  document.getElementById('nextBtn').disabled=true;
  var c=document.getElementById('choices');
  c.innerHTML='';
  q.c.forEach(function(ch,i){
    var b=document.createElement('button');
    b.className='cbtn';b.textContent=ch.t;
    b.onclick=(function(idx){return function(){pick(idx)}})(i);
    c.appendChild(b);
  });
}

function pick(i){
  sel=i;
  document.querySelectorAll('.cbtn').forEach(function(b,j){b.classList.toggle('sel',j===i)});
  document.getElementById('nextBtn').disabled=false;
}

function nextQ(){
  if(sel===null)return;
  var ax=Qs[cur].c[sel].ax;
  for(var k in ax)scores[k]+=ax[k];
  cur++;
  if(cur>=Qs.length)showResult();
  else renderQ();
}

// 판정 로직 개선 (동점 처리 및 쏠림 방지)
function getType(){
  var TF = scores.T >= scores.F ? 'T' : 'F';
  var NS = scores.N >= scores.S ? 'N' : 'S';
  var HA = scores.H >= scores.A ? 'H' : 'P'; // A가 낮으면 P(탐구) 성향으로 대체 유도
  // 만약 H와 A 점수가 모두 낮으면 3번째 자리에 다른 핵심 지표를 할당
  if(scores.H < 2 && scores.A < 2) HA = scores.N > scores.S ? 'N' : 'F';
  
  var EJ = scores.E >= scores.J ? 'E' : 'J';
  
  var code = TF + NS + HA + EJ;
  
  // 정의되지 않은 코드가 생성될 경우를 대비한 매핑 (안전장치)
  if(!TYPES[code]) {
      // 가장 점수가 높은 4개를 조합하여 가장 유사한 유형 반환
      var sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
      var topKeys = sorted.slice(0,4).map(e=>e[0]);
      // 기본값 반환
      return ['SNPE', TYPES['SNPE']];
  }
  
  return [code, TYPES[code]];
}

function showResult(){
  document.getElementById('prog').style.width='100%';
  document.getElementById('s-quiz').classList.remove('active');
  document.getElementById('s-result').classList.add('active');
  var res=getType();var code=res[0];var t=res[1];
  var allAx=Object.entries(scores).sort(function(a,b){return b[1]-a[1]});
  var maxV=allAx[0][1];
  var axHtml=allAx.filter(function(e){return AX_LABEL[e[0]]}).map(function(e){
    return '<span class="ax '+(e[1]>=3?'hi':'lo')+'">'+AX_LABEL[e[0]]+'</span>'
  }).join('');
  var coursesHtml=t.courses.map(function(c){return '<span class="chip">'+c+'</span>'}).join('');
  window._shareCode=code;window._shareName=t.name;
  document.getElementById('result-content').innerHTML=
    '<div class="r-emoji">'+t.emoji+'</div>'+
    '<div class="r-code">'+code+'</div>'+
    '<div class="r-name">'+t.name+'</div>'+
    '<div class="r-sub">'+t.sub+'</div>'+
    '<div style="border-top:1px solid #f0ede6;margin:1.1rem 0"></div>'+
    '<div class="r-greeting">'+nickname+'님은 바로 이런 타입이에요!</div>'+
    '<div class="r-desc">'+t.desc+'</div>'+
    '<div class="r-dir">💡 '+nickname+'님, 이런 방향은 어떨까요?<br>'+t.dir+'</div>'+
    '<div style="margin-bottom:1.25rem"><div class="section-label">추천 수업</div>'+coursesHtml+'</div>'+
    '<div style="margin-bottom:0.5rem"><div class="section-label">나의 인문학 감수성</div><div class="axes-row">'+axHtml+'</div></div>'+
    '<div class="share-section">'+
    '<div class="share-label">친구에게 공유하기</div>'+
    '<button class="share-btn" onclick="doShare()">공유하기</button>'+
    '<button class="share-btn copy" onclick="doCopy()">링크 복사</button>'+
    '</div>';
}

function doShare(){
  var text=nickname+'님의 인문학 유형은 ['+window._shareCode+' '+window._shareName+']!\n나도 테스트 해보기 →';
  if(navigator.share){
    navigator.share({title:'나의 인문학 유형 테스트',text:text,url:location.href});
  } else {doCopy();}
}

function doCopy(){
  var text=nickname+'님의 인문학 유형은 ['+window._shareCode+' '+window._shareName+']!\n나도 테스트 해보기 → '+location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){showToast('클립보드에 복사됐어요!')}).catch(function(){fallbackCopy(text)});
  } else {fallbackCopy(text);}
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('복사됐어요!');}catch(e){showToast('직접 URL을 복사해주세요.');}
  document.body.removeChild(ta);
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2200);
}

function restart(){
  cur=0;scores={T:0,F:0,N:0,S:0,H:0,A:0,E:0,P:0,J:0};sel=null;nickname="";
  document.getElementById('s-result').classList.remove('active');
  document.getElementById('nameInput').value='';
  document.getElementById('s-intro').classList.add('active');
}

document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')startTest()});
</script>
